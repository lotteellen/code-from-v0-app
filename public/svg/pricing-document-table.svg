<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <!-- Removed grey background -->
  
  <!-- Standardized shadow filter -->
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main document path with cutout for folded corner -->
  <path d="M 154 101 C 154 85.536 166.536 73 182 73 L 565 73 L 565 83 L 604 122 L 626 122 L 626 645 C 626 660.464 613.464 673 598 673 L 182 673 C 166.536 673 154 660.464 154 645 Z" 
        fill="white" 
        filter="url(#cardShadow)" 
        stroke="#D1D5DB" 
        stroke-width="2"/>
  
  <!-- Smaller folded corner flap -->
  <path d="M 565 73 L 565 83 C 565 102 583 122 604 122 L 626 122 L 565 73 Z" 
