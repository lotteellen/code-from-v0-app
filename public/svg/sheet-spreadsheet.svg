<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <!-- Removed grey background -->
  
  <!-- Standardized container -->
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="23" y="82" width="753" height="636" rx="24" fill="white" filter="url(#cardShadow)" stroke="#D1D5DB" stroke-width="2"/>
  
  <!-- Title -->
  <text x="78" y="156" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="400" fill="#8B95A5">Sheet1</text>
  
  <!-- Standardized spreadsheet grid with consistent stroke -->
  <rect x="78" y="203" width="643" height="68" rx="6" fill="none" stroke="#E5E7EB" stroke-width="1"/>
  
