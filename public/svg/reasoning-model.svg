<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <!-- Removed grey background -->
  
  <!-- Consistent shadow filter -->
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Standardized background card with shadow and padding -->
  <rect x="110" y="63" width="471" height="660" rx="24" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#D1D5DB" stroke-width="2"/>
  
  <!-- Header -->
