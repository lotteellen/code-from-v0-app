<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <!-- Removed grey background -->
  
  <!-- Standardized container -->
  <!-- Added consistent shadow filter -->
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Added consistent padding (80px), shadow, and border to outer box -->
  <rect x="23" y="94" width="753" height="613" rx="24" fill="white" filter="url(#cardShadow)" stroke="#D1D5DB" stroke-width="2"/>
  
  <!-- Standardized avatar -->
  <!-- Removed grey background from avatar -->
  <circle cx="141" cy="204" r="49" fill="none" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- Subject heading -->
  <text x="223" y="223" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="400" fill="#8B95A5">Subject</text>
  
  <!-- Standardized placeholder content lines -->
  <rect x="91" y="308" width="390" height="22" rx="11" fill="#EEF0F3"/>
  <rect x="91" y="379" width="601" height="22" rx="11" fill="#EEF0F3"/>
  <rect x="91" y="441" width="504" height="22" rx="11" fill="#EEF0F3"/>
  <rect x="91" y="512" width="328" height="22" rx="11" fill="#EEF0F3"/>
</svg>
