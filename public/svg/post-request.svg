<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Standardized AI Badge background -->
  <circle cx="473" cy="189" rx="110" fill="none" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- AI Text -->
  <text x="355" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="94" fill="#9CA3AF" font-weight="600">AI</text>
  
  <!-- Standardized browser window -->
  <rect x="129" y="259" width="542" height="369" rx="16" fill="#FFFFFF" filter="url(#cardShadow)" stroke="#D1D5DB" stroke-width="2"/>
  <rect x="129" y="259" width="542" height="47" rx="16 16 0 0" fill="#FFFFFF"/>
  
  <!-- Window controls -->
  <circle cx="159" cy="296" r="7" fill="#EF4444"/>
  <circle cx="183" cy="296" r="7" fill="#F59E0B"/>
  <circle cx="207" cy="296" r="7" fill="#10B981"/>
  
  <!-- Title -->
  <text x="310" y="303" font-family="system-ui, -apple-system, sans-serif" font-size="25" fill="#6B7280" font-weight="500">POST request</text>
  
  <!-- Code content -->
  <text x="175" y="401" font-family="ui-monospace, monospace" font-size="28" fill="#6B7280" font-weight="400">fetch</text>
  
  <!-- Standardized code lines -->
  <rect x="279" y="381" width="338" height="17" rx="8" fill="#DBEAFE"/>
  <rect x="214" y="428" width="232" height="17" rx="8" fill="#DBEAFE"/>
  <rect x="175" y="471" width="126" height="17" rx="8" fill="#DBEAFE"/>
  <rect x="214" y="514" width="47" height="17" rx="8" fill="#DBEAFE"/>
  
  <!-- Loading spinner -->
  <g transform="translate(175, 565)">
    <path d="M 16 0 A 16 16 0 0 1 27.31 27.31" stroke="#D1D5DB" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Standardized document preview -->
  <rect x="409" y="467" width="236" height="259" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2" filter="url(#shadow)"/>
  
  <!-- Folded corner -->
  <path d="M 621 467 L 621 506 L 582 467 Z" fill="#F3F4F6"/>
  
  <text x="456" y="518" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#6B7280">pricing.pdf</text>
  
  <!-- Document content lines -->
  <rect x="440" y="557" width="157" height="9" rx="5" fill="#F3F4F6"/>
  <rect x="440" y="580" width="141" height="9" rx="5" fill="#F3F4F6"/>
  <rect x="500" y="628" width="118" height="9" rx="5" fill="#F3F4F6"/>
  <rect x="500" y="651" width="102" height="9" rx="5" fill="#F3F4F6"/>
  
  <!-- Document preview - partial -->
  <rect x="472" y="511" width="126" height="157" rx="10" fill="#FFFFFF" opacity="0.8" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow-light)"/>
  <text x="491" y="545" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#9CA3AF">pac...</text>
  
  <!-- Standardized shadow filters -->
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="10" flood-opacity="0.1"/>
    </filter>
    <filter id="shadow-light" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
