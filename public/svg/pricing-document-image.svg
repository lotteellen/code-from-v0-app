<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Added shadow filter definition -->
  <defs>
    <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="800" fill="#F9FAFB"/>
  
  <!-- Main document card with rounded corners -->
  <path d="M 154 101 C 154 85.536 166.536 73 182 73 L 565 73 L 565 83 L 604 122 L 626 122 L 626 645 C 626 660.464 613.464 673 598 673 L 182 673 C 166.536 673 154 660.464 154 645 Z" fill="white" filter="url(#cardShadow)" stroke="#D1D5DB" stroke-width="2"/>
  
  <!-- Smaller folded corner flap -->
  <path d="M 565 73 L 565 83 C 565 102 583 122 604 122 L 626 122 L 565 73 Z" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="2"/>
  
  <!-- Fold line for subtle depth -->
  <line x1="565" y1="83" x2="604" y2="122" stroke="#D1D5DB" stroke-width="1" opacity="0.4"/>
  
  <!-- Title -->
  <text x="324" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="50" font-weight="400" fill="#9CA3AF">pricing.pdf</text>
  
  <!-- Standardized image placeholder -->
  <rect x="275" y="258" width="244" height="152" rx="12" fill="none" stroke="#E5E7EB" stroke-width="1"/>
  
  <!-- Standardized placeholder lines -->
  <rect x="213" y="441" width="379" height="17" rx="8" fill="#F3F4F6"/>
  <rect x="213" y="492" width="379" height="17" rx="8" fill="#F3F4F6"/>
  <rect x="213" y="543" width="265" height="17" rx="8" fill="#F3F4F6"/>
  <rect x="213" y="590" width="207" height="17" rx="8" fill="#F3F4F6"/>
</svg>
