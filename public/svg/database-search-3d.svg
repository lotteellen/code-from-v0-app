<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <!-- Removed grey background -->
  
  <!-- Standardized 3D Database cylinder with consistent styling -->
  <ellipse cx="400" cy="219" rx="125" ry="55" fill="white" stroke="#D1D5DB" stroke-width="2"/>
  <ellipse cx="400" cy="219" rx="125" ry="55" fill="url(#grad1)"/>
  
  <!-- Cylinder body -->
  <rect x="277.5" y="219" width="245" height="221" fill="white" stroke="#D1D5DB" stroke-width="2"/>
  <rect x="277.5" y="219" width="245" height="221" fill="url(#grad2)"/>
  
  <!-- Horizontal dividers -->
  <ellipse cx="400" cy="274" rx="125" ry="55" fill="none" stroke="#E5E7EB" stroke-width="2"/>
  <ellipse cx="400" cy="329" rx="125" ry="55" fill="none" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- Bottom ellipse -->
  <ellipse cx="400" cy="384" rx="125" ry="55" fill="white" stroke="#D1D5DB" stroke-width="2"/>
  <ellipse cx="400" cy="384" rx="125" ry="55" fill="url(#grad1)"/>
  
  <!-- Standardized search bar overlay -->
  <rect x="117" y="344" width="566" height="109" rx="54" fill="white" stroke="#D1D5DB" stroke-width="2"/>
  
  <!-- Search icon -->
  <circle cx="188" cy="398" r="27" fill="none" stroke="#9CA3AF" stroke-width="5"/>
  <line x1="208" y1="418" x2="225" y2="435" stroke="#9CA3AF" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F3F4F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F3F4F6;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#FAFAFA;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#E5E7EB;stop-opacity:0.5" />
    </linearGradient>
  </defs>
</svg>
